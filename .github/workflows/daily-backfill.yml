name: Daily Backfill Realized

on:
  workflow_dispatch:
  schedule:
    - cron: "17 22 * * *"

permissions:
  contents: write

concurrency:
  group: daily-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare artifact folders
        run: |
          mkdir -p artifacts_part3
          mkdir -p artifacts_part3_v1

      - name: Run realized backfill
        run: |
          python backfill_realized.py

      - name: Show updated files
        if: always()
        run: |
          echo "=== artifacts_part3 ==="
          find artifacts_part3 -maxdepth 2 -type f | sort || true
          echo "=== artifacts_part3_v1 ==="
          find artifacts_part3_v1 -maxdepth 2 -type f | sort || true

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-backfill-artifacts
          path: |
            artifacts_part3/**
            artifacts_part3_v1/**
          if-no-files-found: warn

      - name: Commit updated tracked files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No tracked file changes to commit."
          else
            git commit -m "Update realized backfill"
            git push
          fi
