name: Daily Backfill Realized

on:
  workflow_dispatch:
  schedule:
    - cron: "17 22 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: daily-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run realized backfill
        env:
          PRICECALL_ROOT: ${{ github.workspace }}
        run: |
          python backfill_realized.py

      - name: Commit updated prediction log
        run: |
          if [ ! -f artifacts_part3/prediction_log.csv ]; then
            echo "prediction_log.csv does not exist. Nothing to commit."
            exit 0
          fi
      
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      
          git add artifacts_part3/prediction_log.csv
      
          if git diff --cached --quiet; then
            echo "No backfill changes to commit."
            exit 0
          fi
      
          git commit -m "Backfill realized prediction log"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
          
