name: Daily Backfill Realized

on:
  schedule:
    - cron: "0 20 * * 1-5"   # 4:00 PM ET (after market close, allows settled prices)
  workflow_dispatch:

# ── Same concurrency group as the production pipeline ────────────────────
# Prevents backfill from running while the production pipeline is active
# and writing to the same artifact files (prediction_log.csv,
# live_attribution_report.json). Both workflows queue rather than cancel.
concurrency:
  group: pricecall-production
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30
    env:
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      PRICECALL_ROOT: ${{ github.workspace }}
      PRICECALL_STRICT_DRIVE_ONLY: "0"

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backfill
        run: python backfill_realized.py

      - name: Commit and push backfill artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f \
            artifacts_part3/prediction_log.csv \
            artifacts_part9/live_attribution_report.json || true

          if git diff --cached --quiet; then
            echo "No backfill changes to commit."
            exit 0
          fi

          git commit -m "Backfill realized prices [skip ci]"

          git pull origin "${GITHUB_REF_NAME}" \
            --no-rebase \
            --strategy-option=ours \
            --no-edit || true

          git push origin HEAD:"${GITHUB_REF_NAME}"

