name: Daily Production Run

# FIX (Audit 2026-04-24): replaced the two-cron DST hack + 15-minute Python
# gate with a single native-timezone cron.
#
# ROOT CAUSE OF PRIOR FAILURES
# ─────────────────────────────
# The old design used two weekday crons (13:35 UTC and 14:35 UTC) plus a
# Python gate that only accepted runs landing between 9:30 and 9:45 AM ET
# (a 15-minute window). GitHub's scheduler is not a precision timer; runs
# routinely start 20-60+ minutes after the nominal cron time, and when a
# second run queues behind the first via the concurrency guard the delay
# compounds to 90+ minutes. Every production run since April 21 landed
# between 10:57 AM and 12:18 PM EDT — all outside the 9:30-9:45 window.
# The gate returned false, all subsequent steps were skipped, and the run
# exited green in ~1 minute. No artifact was ever written.
#
# SOLUTION
# ─────────
# 1. Use GitHub's native timezone support so a single cron always resolves
#    to 9:35 AM ET regardless of DST. No Python DST arithmetic needed.
# 2. Widen the gate to 9:00-11:30 AM ET, tolerating up to 115 minutes of
#    GitHub scheduler drift while still blocking accidental off-hours runs.
# 3. The redundant second cron is removed. One trigger fires once per day.
on:
  schedule:
    - cron: "35 9 * * 1-5"
      timezone: "America/New_York"   # 9:35 AM ET — handles EDT/EST automatically
  workflow_dispatch:                 # always available for manual runs

# ── Concurrency guard ────────────────────────────────────────────────────
# Prevents the daily-backfill and production pipeline from running
# simultaneously and creating git conflicts on shared artifact files.
# cancel-in-progress: false ensures a running pipeline is never killed;
# a new dispatch waits for the current run to finish instead.
concurrency:
  group: pricecall-production
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 90
    env:
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      PRICECALL_ROOT: ${{ github.workspace }}
      PRICECALL_STRICT_DRIVE_ONLY: "0"

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Restore accumulated artifacts before running ──────────────────
      # FIX (Finding C, Audit 2026-04-21):
      # actions/checkout always starts with a clean workspace snapshot from
      # the commit at checkout time. If prediction_log.csv (or other
      # accumulating artifacts) were updated by a previous run and committed,
      # they are present in the workspace; but if the commit step was skipped
      # (e.g., "no artifact changes to commit") the file on disk reflects
      # only what was in the last commit, not what the last run wrote.
      #
      # The authoritative copy of accumulating artifacts lives on the remote.
      # Fetch and hard-reset these files from origin before the pipeline runs
      # so Part 3's _upsert_prediction_log appends to the full existing history
      # rather than starting over from an empty or stale file.
      #
      # Paths covered:
      #   artifacts_part3/prediction_log.csv  — Part 3 live prediction history
      #   artifacts_part9/live_attribution_report.json — Part 9 live stats
      #
      # Strategy: `git fetch` then `git checkout origin/HEAD -- <path>`.
      # Falls back silently if the file doesn't exist on the remote yet
      # (first-ever run). Uses `|| true` so a missing remote file is not fatal.
      - name: Restore accumulating artifacts from remote
        run: |
          git fetch origin "${GITHUB_REF_NAME}" --quiet || true
          git checkout "origin/${GITHUB_REF_NAME}" -- \
            artifacts_part3/prediction_log.csv \
            2>/dev/null || echo "prediction_log.csv not on remote yet — starting fresh."
          git checkout "origin/${GITHUB_REF_NAME}" -- \
            artifacts_part9/live_attribution_report.json \
            2>/dev/null || echo "live_attribution_report.json not on remote yet — starting fresh."

      # ── Gate key consistency guard ─────────────────────────────────────
      # REQUIRED: the gate step writes exactly one output key (currently
      # "run"). Every downstream if: condition must reference that same key
      # via steps.gate.outputs.<key>. A mismatch causes those conditions to
      # evaluate as empty-string (falsy), silently skipping the pipeline
      # while the workflow still exits green — the exact failure mode that
      # caused production to stop updating in April 2026.
      #
      # This step greps the workflow file at runtime, extracts the key name
      # written by the gate, and then verifies all downstream references use
      # that same key. It fails loudly before the gate runs if they disagree.
      # On any merge or edit to this file, watch for this step in the run log.
      - name: Verify gate output key is consistent throughout workflow
        run: |
          # Derive the workflow file path dynamically from the GitHub-injected
          # GITHUB_WORKFLOW_REF variable (format: owner/repo/.github/workflows/<file>@ref).
          # This means the self-check works correctly regardless of what the file
          # is named or where it is stored — no hardcoded path to keep in sync.
          WORKFLOW_FILE="${GITHUB_WORKSPACE}/$(echo "${GITHUB_WORKFLOW_REF}" | sed 's|[^/]*/[^/]*/||; s|@.*||')"

          # Extract the key name written by the gate step.
          # Looks for:  f.write("run=...") or f.write("run_ok=...")
          WRITTEN_KEY=$(grep -oP '(?<=f\.write\(")[a-z_]+(?==)' "$WORKFLOW_FILE" | head -1)
          if [ -z "$WRITTEN_KEY" ]; then
            echo "ERROR: Could not extract gate output key from $WORKFLOW_FILE"
            exit 1
          fi
          echo "Gate writes output key: '${WRITTEN_KEY}'"

          # Count downstream if: conditions referencing the correct key.
          CORRECT=$(grep -c "steps\.gate\.outputs\.${WRITTEN_KEY}" "$WORKFLOW_FILE" || true)
          # Count any if: conditions referencing a DIFFERENT gate output key.
          WRONG=$(grep -cP "steps\.gate\.outputs\.(?!${WRITTEN_KEY})[a-z_]+" "$WORKFLOW_FILE" || true)

          echo "Downstream conditions using '${WRITTEN_KEY}': ${CORRECT}"
          echo "Downstream conditions using a different key:  ${WRONG}"

          if [ "$WRONG" -ne 0 ]; then
            echo ""
            echo "FATAL: gate output key mismatch — downstream steps will be silently skipped."
            echo "Fix: make every 'steps.gate.outputs.*' reference use the same key as the"
            echo "     f.write() call in the gate step ('${WRITTEN_KEY}')."
            grep -nP "steps\.gate\.outputs\." "$WORKFLOW_FILE"
            exit 1
          fi

          echo "OK: gate key '${WRITTEN_KEY}' is consistent throughout the workflow."

      # ── Time gate ─────────────────────────────────────────────────────
      # FIX (Audit 2026-04-24): widened from 9:30-9:45 AM ET (15 min) to
      # 9:00-11:30 AM ET (150 min).
      # The old 15-minute window caused every scheduled run to be silently
      # skipped. Live data shows GitHub delivered all triggers 22-103 min
      # late; every run landed at 10:57 AM-12:18 PM EDT, outside the old
      # window. Gate returned false, pipeline never executed, dashboard went
      # stale. The wider window tolerates realistic scheduler drift while
      # still blocking genuine off-hours accidental triggers.
      # Manual dispatches (workflow_dispatch) always proceed immediately.
      - name: Check run window (skip if outside 9:00-11:30 AM ET on weekdays)
        id: gate
        run: |
          python - <<'PYEOF'
          import sys, os
          from datetime import datetime
          try:
              from zoneinfo import ZoneInfo
          except ImportError:
              from backports.zoneinfo import ZoneInfo

          event = os.environ.get("GITHUB_EVENT_NAME", "")
          if event == "workflow_dispatch":
              print("Manual dispatch — skipping time gate.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("run=true\n")
              sys.exit(0)

          now = datetime.now(ZoneInfo("America/New_York"))
          hour, minute, weekday = now.hour, now.minute, now.weekday()

          # FIX: 9:00-11:30 AM ET covers the 9:35 AM nominal trigger
          # with up to 115 minutes of GitHub scheduler drift.
          # Old: (hour == 9) and (30 <= minute <= 45) -- only 15 min wide,
          #      failed every single live run (all arrived 10:57 AM-12:18 PM).
          in_window = (weekday < 5) and (
              (hour == 9) or
              (hour == 10) or
              (hour == 11 and minute <= 30)
          )
          print(f"NY time: {now.strftime('%H:%M')} weekday={weekday} in_window={in_window}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"run={'true' if in_window else 'false'}\n")

          if not in_window:
              print("Outside 9:00-11:30 AM ET window — skipping run.")
          PYEOF

      - name: Run pipeline
        if: steps.gate.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        run: python run_tuesday_prediction.py --force

      # ── Artifact verification ─────────────────────────────────────────
      - name: Verify required artifacts
        if: steps.gate.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        id: verify
        run: |
          missing=0
          for path in \
            "artifacts_part2_g532/predictions/part2_g532_summary.json" \
            "artifacts_part2a_alpha/predictions/part2a21_alpha_positions.csv" \
            "artifacts_part3/prediction_log.csv" \
            "artifacts_part3_v1/v1_final_production_tape.csv" \
            "artifacts_part6/part6_meta.json" \
            "artifacts_part7/current_target_weights.json" \
            "artifacts_part8/part8_meta.json" \
            "artifacts_part9/live_attribution_report.json"
          do
            if [ -f "$path" ]; then
              echo "OK: $path"
            else
              echo "MISSING: $path"
              missing=$((missing + 1))
            fi
          done
          echo "missing=$missing" >> "$GITHUB_OUTPUT"

      - name: Run missing=${{ steps.verify.outputs.missing }}
        if: steps.gate.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ steps.verify.outputs.missing }}" != "0" ]; then
            echo "Required artifacts are missing — aborting commit."
            exit 1
          fi

      # ── Commit and push ───────────────────────────────────────────────
      # Uses --no-rebase merge with -X ours to resolve any artifact
      # conflicts in favour of the current run's output. Artifact files
      # are always authoritative from the most-recent run.
      - name: Commit and push artifacts
        if: steps.gate.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage all artifact outputs, forcing past .gitignore
          git add -f \
            artifacts_part2_g532/predictions/ \
            artifacts_part2a_alpha/predictions/ \
            artifacts_part3/ \
            artifacts_part3_v1/ \
            artifacts_part6/ \
            artifacts_part7/ \
            artifacts_part8/ \
            artifacts_part9/ \
            artifacts_part10_bot/ || true
          git add -f artifacts_part2b_xgb/ 2>/dev/null || true
          git add -f artifacts_part2c_bnn/ 2>/dev/null || true

          # Skip commit if nothing changed
          if git diff --cached --quiet; then
            echo "No artifact changes to commit."
            exit 0
          fi

          git commit -m "Update daily production artifacts [skip ci]"

          # Pull remote changes, resolving any JSON/CSV conflicts by
          # keeping the current run's version (ours).
          git pull origin "${GITHUB_REF_NAME}" \
            --no-rebase \
            --strategy-option=ours \
            --no-edit || true

          git push origin HEAD:"${GITHUB_REF_NAME}"
