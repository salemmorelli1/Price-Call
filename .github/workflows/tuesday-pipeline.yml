name: Tuesday Prediction Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
on:
  workflow_dispatch:
    inputs:
      force_run:
        description: "Run even if the script would normally skip"
        required: false
        default: false
        type: boolean
  schedule:
    # Tuesday 14:39 UTC.
    # GitHub Actions cron is UTC only, so this does not auto-adjust for DST.
    - cron: "39 14 * * 2"

permissions:
  contents: write

concurrency:
  group: tuesday-prediction
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare artifact folders
        run: |
          mkdir -p artifacts_part1
          mkdir -p artifacts_part2a_alpha
          mkdir -p artifacts_part3
          mkdir -p artifacts_part3_v1

      - name: Run Tuesday prediction pipeline
        run: |
          if [ "${{ github.event.inputs.force_run || 'false' }}" = "true" ]; then
            python run_tuesday_prediction.py --force
          else
            python run_tuesday_prediction.py
          fi

      - name: Show generated files
        if: always()
        run: |
          echo "=== artifacts_part1 ==="
          find artifacts_part1 -maxdepth 2 -type f | sort || true
          echo "=== artifacts_part2a_alpha ==="
          find artifacts_part2a_alpha -maxdepth 2 -type f | sort || true
          echo "=== artifacts_part3 ==="
          find artifacts_part3 -maxdepth 2 -type f | sort || true
          echo "=== artifacts_part3_v1 ==="
          find artifacts_part3_v1 -maxdepth 2 -type f | sort || true

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: tuesday-pipeline-artifacts
          path: |
            artifacts_part1/**
            artifacts_part2a_alpha/**
            artifacts_part3/**
            artifacts_part3_v1/**
          if-no-files-found: warn

      - name: Commit updated tracked files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No tracked file changes to commit."
          else
            git commit -m "Update Tuesday prediction artifacts"
            git push
          fi
