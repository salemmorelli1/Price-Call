name: Tuesday Production Run

on:
  workflow_dispatch:
  schedule:
    # 09:35 America/New_York during DST
    - cron: "35 13 * * 2"
    # 09:35 America/New_York during Standard Time
    - cron: "35 14 * * 2"

permissions:
  contents: write

concurrency:
  group: tuesday-production-run
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Gate scheduled run to 09:35 America/New_York
        id: gate
        if: github.event_name == 'schedule'
        run: |
          python - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          now = datetime.now(ZoneInfo("America/New_York"))
          ok = (now.weekday() == 1 and now.hour == 9 and now.minute == 35)
          print(f"America/New_York now: {now.isoformat()} | run_ok={ok}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"run_ok={'true' if ok else 'false'}\n")
          PY

      - name: Run pipeline
        if: github.event_name == 'workflow_dispatch' || steps.gate.outputs.run_ok == 'true'
        env:
          PRICECALL_ROOT: ${{ github.workspace }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python run_tuesday_prediction.py --force

      - name: Commit updated production artifacts
        if: github.event_name == 'workflow_dispatch' || steps.gate.outputs.run_ok == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            artifacts_part2_g532/predictions \
            artifacts_part2a_alpha/predictions \
            artifacts_part3 \
            artifacts_part3_v1 \
            artifacts_part7 \
            artifacts_part8 \
            artifacts_part9

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update weekly production artifacts"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
