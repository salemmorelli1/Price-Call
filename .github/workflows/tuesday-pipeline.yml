name: Daily Production Run

on:
  workflow_dispatch:
  schedule:
    - cron: "35 13 * * 1-5"
    - cron: "35 14 * * 1-5"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: daily-production-run
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Gate scheduled run to 09:35 America/New_York on weekdays
        id: gate
        if: github.event_name == 'schedule'
        run: |
          python - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          now = datetime.now(ZoneInfo("America/New_York"))
          ok = (now.weekday() in {0, 1, 2, 3, 4} and now.hour == 9 and now.minute == 35)
          print(f"America/New_York now: {now.isoformat()} | run_ok={ok}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"run_ok={'true' if ok else 'false'}\n")
          PY

      - name: Run canonical daily pipeline
        if: github.event_name == 'workflow_dispatch' || steps.gate.outputs.run_ok == 'true'
        env:
          PRICECALL_ROOT: ${{ github.workspace }}
          PRICECALL_STRICT_DRIVE_ONLY: "1"
          PRICECALL_ALPHA_FAMILY: "part2a21"
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python run_tuesday_prediction.py --force

      - name: Verify critical artifacts were created
        if: github.event_name == 'workflow_dispatch' || steps.gate.outputs.run_ok == 'true'
        run: |
          missing=0

          for path in \
            artifacts_part2_g532/predictions/part2_g532_summary.json \
            artifacts_part2a_alpha/predictions/part2a21_alpha_positions.csv \
            artifacts_part3/prediction_log.csv \
            artifacts_part3_v1/v1_final_production_tape.csv \
            artifacts_part6/part6_meta.json \
            artifacts_part7/current_target_weights.json \
            artifacts_part8/part8_meta.json \
            artifacts_part9/live_attribution_report.json
          do
            if [ ! -e "$path" ]; then
              echo "MISSING: $path"
              missing=1
            else
              echo "OK: $path"
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Critical production artifacts were not created."
            exit 1
          fi

      - name: Commit updated production artifacts
        if: success() && (github.event_name == 'workflow_dispatch' || steps.gate.outputs.run_ok == 'true')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for path in \
            artifacts_part2_g532/predictions \
            artifacts_part2a_alpha/predictions \
            artifacts_part3 \
            artifacts_part3_v1 \
            artifacts_part6 \
            artifacts_part7 \
            artifacts_part8 \
            artifacts_part9 \
            artifacts_part10_bot
          do
            if [ -e "$path" ]; then
              git add -f "$path"
            fi
          done

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update daily production artifacts [skip ci]"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
