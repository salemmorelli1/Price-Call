name: Daily Backfill Realized

on:
  workflow_dispatch:
  schedule:
    - cron: "17 22 * * 1-5"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: daily-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run realized backfill
        env:
          PRICECALL_ROOT: ${{ github.workspace }}
          PRICECALL_STRICT_DRIVE_ONLY: "1"
          PRICECALL_ALPHA_FAMILY: "part2a21"
        run: |
          python backfill_realized.py

      - name: Refresh live attribution
        env:
          PRICECALL_ROOT: ${{ github.workspace }}
          PRICECALL_STRICT_DRIVE_ONLY: "1"
          PRICECALL_ALPHA_FAMILY: "part2a21"
        run: |
          python part9_live_attribution.py

      - name: Commit updated live artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -f artifacts_part3/prediction_log.csv ]; then
            git add -f artifacts_part3/prediction_log.csv
          fi

          if [ -f artifacts_part9/live_attribution_report.json ]; then
            git add -f artifacts_part9/live_attribution_report.json
          fi

          if git diff --cached --quiet; then
            echo "No backfill changes to commit."
            exit 0
          fi

          git commit -m "Backfill realized prediction log and refresh live attribution [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
