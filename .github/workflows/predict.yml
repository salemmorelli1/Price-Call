name: Tuesday Prediction

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: "Force pipeline even outside Tuesday 09:35–09:39 ET"
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "*/5 13-15 * * 2"

permissions:
  contents: write

concurrency:
  group: tuesday-prediction
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tuesday prediction pipeline
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_run }}" = "true" ]; then
            python run_tuesday_prediction.py --force
          else
            python run_tuesday_prediction.py
          fi



      - name: Commit updated artifacts if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      
          echo "=== files created by pipeline ==="
          find artifacts_part1 -maxdepth 2 -type f | sort || true
          find artifacts_part2_v77 -maxdepth 3 -type f | sort || true
          find artifacts_part3 -maxdepth 2 -type f | sort || true
          ls -l v141_final_production_tape.csv v141_final_production_governance.csv || true
      
          echo "=== git status before add ==="
          git status --short
      
          git add -A
      
          echo "=== git status after add ==="
          git status --short
      
          if git diff --cached --quiet; then
            echo "No changes staged."
            exit 0
          fi
      
          git commit -m "Automated Tuesday prediction update"
          git pull --rebase origin main || true
          git push origin HEAD:main

      
      - name: Upload generated outputs
        uses: actions/upload-artifact@v4
        with:
          name: tuesday-prediction-outputs
          path: |
            artifacts_part1/**
            artifacts_part2_v77/**
            artifacts_part3/**
            v141_final_production_tape.csv
            v141_final_production_governance.csv
          if-no-files-found: warn
      
      
                
