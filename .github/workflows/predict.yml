name: Tuesday Prediction

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: "Force pipeline even outside Tuesday 09:35–09:39 ET"
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "*/5 13-15 * * 2"

permissions:
  contents: write

concurrency:
  group: tuesday-prediction
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tuesday prediction pipeline
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_run }}" = "true" ]; then
            python run_tuesday_prediction.py --force
          else
            python run_tuesday_prediction.py
          fi

      - name: Commit updated artifacts if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Automated Tuesday prediction update"
          git pull --rebase origin main || true
          git push




          
