name: Tuesday Prediction

on:
  schedule:
    - cron: "*/5 13-15 * * 2"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tuesday-prediction
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tuesday prediction pipeline
        run: |
          python run_tuesday_prediction.py

      - name: Commit updated artifacts if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts_part1/ artifacts_part2_v77/ artifacts_part3/ v141_final_production_tape.csv v141_final_production_governance.csv || true
          git diff --cached --quiet || git commit -m "Automated Tuesday prediction update"
          git push
