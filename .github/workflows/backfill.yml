name: Daily Backfill Realized

on:
  workflow_dispatch:
  schedule:
    - cron: "17 22 * * *"

permissions:
  contents: write

concurrency:
  group: daily-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run realized backfill
        run: |
          python backfill_realized.py

      - name: Commit updated prediction log if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Automated realized backfill update"
          git pull --rebase origin main || true
          git push
